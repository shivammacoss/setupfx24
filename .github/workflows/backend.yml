#Backend CI

name: Backend.js CI
on:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: self-hosted
    strategy:
      matrix:
        node-version: [22.x]
    steps:
      - name: Backup .env
        run: |
          if [ -f .env ]; then mv .env /tmp/env_backup; fi
      - uses: actions/checkout@v4
      - name: Restore .env
        run: |
          if [ -f /tmp/env_backup ]; then mv /tmp/env_backup .env; fi
      - run: npm ci
      - run: npm run build --if-present
      - run: sudo pm2 restart backend